short_bio_text_justify: false
short_bio: >-
  <p>
    I am currently a Postdoctoral Associate at Yale University, working with
    <a href="https://xiangzhou.github.io/" target="_blank">Prof. Xiang Zhou</a>.
    My research focuses on advancing the computational analysis of single-cell and spatial transcriptomics
    using artificial intelligence, particularly large language models and foundation models.
  </p>
  <p>
    I am interested in developing multimodal representation learning methods and scalable AI frameworks
    that integrate single-cell transcriptomics, spatial transcriptomics, histology images, and other
    heterogeneous biological data sources to better characterize cellular heterogeneity and tissue spatial architecture.
  </p>
  <p>
    More broadly, I explore the potential of foundation models and intelligent AI systems in biomedical research,
    with the goal of enabling new computational paradigms for mechanistic studies of complex diseases such as cancer
    and for precision medicine.
  </p>
  <p>
    I received my Ph.D. in Bioinformatics from Tsinghua University, where I was advised by
    Academician <a href="https://www.tsinghua.edu.cn/info/1167/93841.htm" target="_blank">Yanda Li</a>
    and Professor <a href="https://www.au.tsinghua.edu.cn/info/1078/3172.htm" target="_blank">Shao Li</a>.
  </p>

